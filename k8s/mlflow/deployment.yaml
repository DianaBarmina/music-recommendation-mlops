apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  labels:
    app: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: python:3.12-slim
          ports:
            - containerPort: 5000
          command:
            - bash
            - -c
            - |
              pip install mlflow psycopg2-binary &&
              mlflow server
              --backend-store-uri postgresql://mlops:mlops_password@postgres-service:5432/mlops_db
              --default-artifact-root /mlflow/artifacts
              --host 0.0.0.0
              --port 5000
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"

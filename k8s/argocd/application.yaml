apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: music-recommendation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/DianaBarmina/music-recommendation-mlops.git
    targetRevision: main
    path: k8s/app

  destination:
    server: https://kubernetes.default.svc
    namespace: music-rec

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

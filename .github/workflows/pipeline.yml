name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-${{ hashFiles('requirements-api.txt', 'requirements-ui.txt', 'requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install -r requirements-ui.txt
          pip install -r requirements-dev.txt

      - name: black
        run: black src/ services/ tests/ --check

      - name: isort
        run: isort src/ services/ tests/ --check-only

      - name: flake8
        run: flake8 src/ services/ tests/ --max-line-length=88 --extend-ignore=E203,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: >-
            ${{ runner.os }}-pip-${{ hashFiles('requirements-api.txt', 'requirements-ui.txt', 'requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps (dev + runtime)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-api.txt
          pip install -r requirements-ui.txt
          pip install -r requirements-dev.txt


      - name: Create required directories
        run: |
          mkdir -p data/raw data/interim data/processed/reference \
                   data/predictions models reports

      - name: Unit tests
        env:
          USE_GPU: "false"
          DATABASE_URL: "sqlite:///./test_db.db"
        run: pytest tests/unit/ -v --cov=src --cov-report=xml

      - name: Integration tests
        env:
          USE_GPU: "false"
          DATABASE_URL: "sqlite:///./test_db.db"
        run: pytest tests/integration/ -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (check only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          push: false
          tags: music-recommendation-api:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI image (target=ui)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ui
          push: false
          tags: music-recommendation-ui:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Push and Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          target: api
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-api:latest
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-api:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          target: ui
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-ui:latest
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-ui:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

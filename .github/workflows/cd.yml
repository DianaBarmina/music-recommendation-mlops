name: CD

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-api:latest
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-api:${{ steps.sha.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ui/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-ui:latest
            ${{ secrets.DOCKER_USERNAME }}/music-recommendation-ui:${{ steps.sha.outputs.short_sha }}

      - name: Update k8s manifests with new image tag
        run: |
          sed -i "s|image: .*/music-recommendation-api:.*|image: ${{ secrets.DOCKER_USERNAME }}/music-recommendation-api:${{ steps.sha.outputs.short_sha }}|g" k8s/api/deployment.yaml
          if [ -f k8s/ui/deployment.yaml ]; then
            sed -i "s|image: .*/music-recommendation-ui:.*|image: ${{ secrets.DOCKER_USERNAME }}/music-recommendation-ui:${{ steps.sha.outputs.short_sha }}|g" k8s/ui/deployment.yaml
          else
            echo "k8s/ui/deployment.yaml not found, skipping UI manifest update"
          fi

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/api/deployment.yaml
          if [ -f k8s/ui/deployment.yaml ]; then
            git add k8s/ui/deployment.yaml
          fi
          git diff --staged --quiet || git commit -m "chore(k8s): update image tags to ${{ steps.sha.outputs.short_sha }}"
          git push

stages:
  prepare:
    cmd: python -m src.data.make_dataset
    deps:
      - src/data/make_dataset.py
      - src/utils/helpers.py
      - data/raw/january/
      - data/raw/february/
      - params.yaml
    outs:
      - data/interim/clean_interactions.parquet

  featurize:
    cmd: python -m src.data.build_features
    deps:
      - src/data/build_features.py
      - src/utils/helpers.py
      - data/interim/clean_interactions.parquet
      - params.yaml
    outs:
      - data/processed/train_matrix.npz
      - data/processed/val_matrix.npz
      - data/processed/test_matrix.npz
      - data/processed/users_map.parquet
      - data/processed/items_map.parquet
      - data/processed/reference/reference_dataset.parquet

  train:
    cmd: python -m src.models.train_model
    deps:
      - src/models/train_model.py
      - src/utils/helpers.py
      - data/processed/train_matrix.npz
      - params.yaml
    outs:
      - models/als_model.pkl

  evaluate:
    cmd: python -m src.models.evaluate_model
    deps:
      - src/models/evaluate_model.py
      - src/utils/helpers.py
      - models/als_model.pkl
      - data/processed/train_matrix.npz
      - data/processed/val_matrix.npz
      - data/processed/test_matrix.npz
      - data/processed/users_map.parquet
      - data/processed/items_map.parquet
      - params.yaml
    metrics:
      - metrics.json:
          cache: false
